<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سایت تستی من</title>

    <style>
        body {
            font-family: Tahoma, sans-serif;
            background: #f5f5f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        h1 {
            color: #0078ff;
        }

        button {
            background: #0078ff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>سلام دنیا! 🌍</h1>
        <p>اگر این صفحه را می‌بینی، GitHub Pages درست کار می‌کند.</p>

        <button onclick="alert('دکمه کار می‌کند!')">
            کلیک کن
        </button>
    </div>

</body>
</html>
