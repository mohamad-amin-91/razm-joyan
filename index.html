<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رزمیاران | به زودی</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Vazirmatn',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
    radial-gradient(circle at top,#203a73 0%,#0f172a 45%,#020617 100%);
}

.stars{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(white 1px,transparent 1px);
    background-size:50px 50px;
    opacity:.25;
    animation:moveStars 120s linear infinite;
}

@keyframes moveStars{
    from{transform:translateY(0);}
    to{transform:translateY(-1000px);}
}

.card{
    width:90%;
    max-width:900px;
    padding:60px 40px;
    text-align:center;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.15);

    border-radius:30px;

    box-shadow:
    0 0 40px rgba(0,0,0,.35),
    inset 0 0 20px rgba(255,255,255,.05);
}

.logo{
    font-size:60px;
    margin-bottom:20px;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    50%{transform:translateY(-10px);}
}

h1{
    color:white;
    font-size:clamp(35px,5vw,65px);
    margin-bottom:25px;
}

h1 span{
    color:#ffbf69;
}

p{
    color:#d6d6d6;
    font-size:20px;
    line-height:2;
    max-width:650px;
    margin:auto;
}

.line{
    width:180px;
    height:2px;
    background:#ffbf69;
    margin:30px auto;
}

.boxes{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:50px;
    flex-wrap:wrap;
}

.box{
    width:120px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1);
}

.box h2{
    color:#ffbf69;
    font-size:42px;
}

.box span{
    color:white;
}

.footer{
    margin-top:50px;
    color:#aaa;
}

@media(max-width:700px){
    .card{
        padding:40px 20px;
    }

    .box{
        width:90px;
    }

    .box h2{
        font-size:30px;
    }
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="card">

    <div class="logo">🚀</div>

    <h1>
        <span>به زودی</span>
        در دسترس خواهیم بود
    </h1>

    <div class="line"></div>

    <p>
        تیم رزمیاران در حال آماده‌سازی یک تجربه جدید و حرفه‌ای برای شماست.
        به زودی با امکانات ویژه و طراحی مدرن بازخواهیم گشت.
    </p>

    <div class="boxes">
        <div class="box">
            <h2>∞</h2>
            <span>شگفتی</span>
        </div>

        <div class="box">
            <h2>★</h2>
            <span>کیفیت</span>
        </div>

        <div class="box">
            <h2>⚡</h2>
            <span>سرعت</span>
        </div>

        <div class="box">
            <h2>✓</h2>
            <span>امنیت</span>
        </div>
    </div>

    <div class="footer">
        © 2026 RazmJoyan - All Rights Reserved
    </div>

</div>

</body>
</html>
